<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Учет дефектов{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" href="/static/img/logo.png" type="image/png">
</head>
<body>
    <!-- Простая навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="/static/img/logo.png" alt="Логотип" height="30" class="me-2">
                Учет дефектов
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/defects/">Дефекты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ai/">AI Анализ</a>
                    </li>
                </ul>
                
                <div class="navbar-nav">
                    {% if user.is_authenticated %}
                        <span class="nav-link text-white">{{ user.username }}</span>
                        <a class="nav-link" href="{% url 'logout' %}">Выйти</a>
                    {% else %}
                        <a class="nav-link" href="{% url 'login' %}">Войти</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Простой футер -->
    <footer class="mt-5 py-3 bg-light border-top">
        <div class="container">
            <div class="row">
                <div class="col-md-8">
                    <p class="mb-1">© 2025 АО «Завод Электроприбор»</p>
                </div>
                <div class="col-md-4 text-md-end">
                    <p class="mb-0">
                        <a href="https://www.elpri-rele.ru/" target="_blank">
                            Официальный сайт
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
